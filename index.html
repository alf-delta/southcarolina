<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Premium glamping retreat on 126 acres of longleaf pine savanna in Carolina Sandhills, McBee, SC." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,200;9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500&family=Inter+Tight:wght@500&display=swap"
    />

    <!-- Hero image preload — tells browser to fetch immediately -->
    <link rel="preload" as="image" href="/images/sandhills/desktop.webp" fetchpriority="high" media="(min-width: 768px)" />
    <link rel="preload" as="image" href="/images/sandhills/mobile.webp" fetchpriority="high" media="(max-width: 767px)" />
  </head>
  <body>

    <script type="module" src="/src/main.tsx"></script>
